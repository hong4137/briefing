<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JFNB">
    <meta name="application-name" content="JFNB">
    <meta name="msapplication-TileColor" content="#0a0a0f">
    <meta name="msapplication-TileImage" content="icons/icon-144x144.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-72x72.png">
    <title>아카이브 | Jae's Foreign News Briefing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --accent-red: #ff3b3b;
            --accent-orange: #ff8c42;
            --accent-gold: #ffd700;
            --accent-blue: #4a9eff;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --accent-cyan: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #666680;
            --border-color: #2a2a3a;
            --gradient-fire: linear-gradient(135deg, #ff3b3b, #ff8c42);
            --gradient-special: linear-gradient(135deg, #ffd700, #ff8c42);
            --gradient-weekly: linear-gradient(135deg, #06b6d4, #22c55e);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-fire);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .nav-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 900;
            background: var(--gradient-fire);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Nav Right */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        /* Compact Search */
        .nav-search-compact {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.4rem 0.75rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .nav-search-compact:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.15);
        }

        .nav-search-compact .search-icon {
            font-size: 0.85rem;
            margin-right: 0.4rem;
            opacity: 0.6;
        }

        .nav-search-compact input {
            background: transparent;
            border: none;
            width: 80px;
            font-size: 0.8rem;
            color: var(--text-primary);
            font-family: inherit;
        }

        .nav-search-compact input::placeholder {
            color: var(--text-muted);
        }

        .nav-search-compact input:focus {
            outline: none;
            width: 120px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--text-primary); }
        .nav-links a.active { color: var(--accent-red); }

        /* Hero */
        .hero {
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        /* Main Content */
        .archive-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Special Section */
        .special-section {
            margin-bottom: 3rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .section-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }

        .special-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .special-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .special-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .special-card.special::before {
            background: var(--gradient-special);
        }

        .special-card.weekly::before {
            background: var(--gradient-weekly);
        }

        .special-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-gold);
            box-shadow: 0 16px 48px rgba(255, 215, 0, 0.15);
        }

        .special-card.weekly:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 16px 48px rgba(6, 182, 212, 0.15);
        }

        .special-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        .special-badge.special {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 140, 66, 0.2));
            color: var(--accent-gold);
        }

        .special-badge.weekly {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(34, 197, 94, 0.2));
            color: var(--accent-cyan);
        }

        .special-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .special-card .summary {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .special-card .period {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .special-card .stats {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Month Group */
        .month-group {
            margin-bottom: 3rem;
        }

        .month-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .month-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .month-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
        }

        /* Briefing List */
        .briefing-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .briefing-item {
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 1.5rem;
            align-items: center;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        .briefing-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
            transform: translateX(8px);
        }

        .briefing-date {
            text-align: center;
        }

        .briefing-date .day {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-blue);
        }

        .briefing-date .weekday {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .briefing-content h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .briefing-content p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .briefing-meta {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        .footer .heart { color: var(--accent-red); }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-content { flex-direction: column; gap: 1rem; }
            .nav-right { gap: 1rem; }
            .nav-links { gap: 1rem; }
            .nav-search-compact input { width: 60px; }
            .nav-search-compact input:focus { width: 80px; }
            .hero h1 { font-size: 2rem; }
            .briefing-item { 
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .briefing-date { text-align: left; }
            .briefing-meta { text-align: left; }
            .special-grid { grid-template-columns: 1fr; }
        }
    
        /* PWA Install Banner */
        .pwa-install-banner {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a24 0%, #12121a 100%);
            border-top: 1px solid #2a2a3a;
            padding: 1rem 1.5rem;
            z-index: 10000;
            animation: slideUp 0.3s ease-out;
            backdrop-filter: blur(20px);
        }
        .pwa-install-banner.show { display: block; }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .pwa-banner-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .pwa-banner-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .pwa-banner-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff3b3b, #ff8c42);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .pwa-banner-text h4 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
        }
        .pwa-banner-text p {
            font-size: 0.75rem;
            color: #a0a0b0;
            margin: 0;
        }
        .pwa-banner-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .pwa-btn-install {
            padding: 0.5rem 1.25rem;
            background: linear-gradient(135deg, #ff3b3b, #ff8c42);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .pwa-btn-install:hover { opacity: 0.9; }
        .pwa-btn-dismiss {
            padding: 0.5rem 1rem;
            background: transparent;
            color: #666680;
            border: 1px solid #2a2a3a;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .pwa-btn-dismiss:hover { color: #a0a0b0; }

        /* PWA Update Toast */
        .pwa-update-toast {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a24;
            border: 1px solid #4a9eff;
            border-radius: 12px;
            padding: 0.75rem 1.25rem;
            z-index: 10001;
            box-shadow: 0 8px 32px rgba(74, 158, 255, 0.2);
            animation: fadeInUp 0.3s ease-out;
        }
        .pwa-update-toast.show { display: flex; gap: 1rem; align-items: center; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .pwa-update-toast span { font-size: 0.85rem; color: #a0a0b0; }
        .pwa-update-btn {
            padding: 0.4rem 1rem;
            background: #4a9eff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .pwa-install-banner { padding: 0.75rem 1rem; }
            .pwa-banner-text p { display: none; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon">📰</div>
                <span class="nav-logo-text">Jae's Briefing</span>
            </a>
            
            <div class="nav-right">
                <form action="search.html" method="get" class="nav-search-compact">
                    <span class="search-icon">🔍</span>
                    <input type="text" name="q" placeholder="검색...">
                </form>
                
                <ul class="nav-links">
                    <li><a href="index.html">홈</a></li>
                    <li><a href="archive.html" class="active">아카이브</a></li>
                    <li><a href="about.html">소개</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1>📚 아카이브</h1>
        <p>지난 외신 브리핑 모아보기</p>
    </section>

    <!-- Main Content -->
    <main class="archive-content">
        <!-- Special & Weekly Section -->
        <section class="special-section" id="special-section" style="display: none;">
            <div class="section-header">
                <div class="section-icon" style="background: var(--gradient-special);">⭐</div>
                <h2 class="section-title">특별판 & 주간 브리핑</h2>
            </div>
            <div id="special-container" class="special-grid">
            </div>
        </section>

        <!-- Daily Briefings by Month -->
        <div id="archive-container">
            <div class="loading">브리핑을 불러오는 중...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>Curated by Claude with <span class="heart">♥</span></p>
    </footer>

    <script>
        async function loadArchive() {
            try {
                const response = await fetch('briefings.json');
                const data = await response.json();
                
                renderSpecials(data.specials || [], data.weekly || []);
                
                if (data.briefings.length === 0) {
                    document.getElementById('archive-container').innerHTML = 
                        '<div class="empty-state">아직 브리핑이 없습니다.</div>';
                    return;
                }

                renderBriefings(data.briefings);

            } catch (error) {
                console.error('Error loading archive:', error);
                document.getElementById('archive-container').innerHTML = 
                    '<div class="empty-state">브리핑을 불러올 수 없습니다.</div>';
            }
        }

        function renderSpecials(specials, weekly) {
            const allItems = [];

            weekly.forEach(w => {
                allItems.push({
                    type: 'weekly',
                    date: w.date,
                    title: w.title,
                    summary: w.summary,
                    period: w.period,
                    stats: w.stats,
                    badge: '📅 주간 브리핑',
                    link: `archive/${w.date}.html`
                });
            });

            specials.forEach(s => {
                allItems.push({
                    type: 'special',
                    date: s.date,
                    title: s.title,
                    summary: s.summary,
                    period: s.period,
                    stats: s.stats,
                    badge: '⭐ 특별판',
                    link: `archive/${s.date}.html`
                });
            });

            if (allItems.length === 0) {
                document.getElementById('special-section').style.display = 'none';
                return;
            }

            // period 종료일 기준 최신순 정렬 (단일 날짜도 지원)
            allItems.sort((a, b) => {
                const getEndDate = (item) => {
                    if (item.period && item.period.includes('~')) {
                        return item.period.split('~')[1].trim();
                    }
                    if (item.period && /^\d{4}-\d{2}-\d{2}/.test(item.period.trim())) {
                        return item.period.trim();
                    }
                    return '0000-00-00';
                };
                return getEndDate(b).localeCompare(getEndDate(a));
            });

            document.getElementById('special-section').style.display = 'block';

            document.getElementById('special-container').innerHTML = allItems.map(item => `
                <a href="${item.link}" class="special-card ${item.type}">
                    <div class="special-badge ${item.type}">${item.badge}</div>
                    <h3>${item.title}</h3>
                    <p class="summary">${item.summary}</p>
                    <div class="period">📆 ${item.period}</div>
                    <div class="stats">
                        <span>📰 ${item.stats.articles || item.stats.clusters || 0} ${item.type === 'weekly' ? '클러스터' : '기사'}</span>
                        <span>📑 ${item.stats.sections || item.stats.clusters || 0} 섹션</span>
                    </div>
                </a>
            `).join('');
        }

        function renderBriefings(briefings) {
            const months = {};
            
            briefings.forEach(b => {
                if (!b.date.match(/^\d{4}-\d{2}-\d{2}$/)) return;
                
                const monthKey = b.date.substring(0, 7);
                if (!months[monthKey]) {
                    months[monthKey] = [];
                }
                months[monthKey].push(b);
            });

            const sortedMonths = Object.keys(months).sort().reverse();

            const monthNames = {
                '01': '1월', '02': '2월', '03': '3월', '04': '4월',
                '05': '5월', '06': '6월', '07': '7월', '08': '8월',
                '09': '9월', '10': '10월', '11': '11월', '12': '12월'
            };

            let html = '';

            sortedMonths.forEach(monthKey => {
                const [year, month] = monthKey.split('-');
                const monthBriefings = months[monthKey];
                
                monthBriefings.sort((a, b) => b.date.localeCompare(a.date));

                html += `
                    <div class="month-group">
                        <div class="month-header">
                            <div class="month-icon">📅</div>
                            <h2 class="month-title">${year}년 ${monthNames[month]}</h2>
                        </div>
                        <div class="briefing-list">
                            ${monthBriefings.map(b => `
                                <a href="archive/${b.date}.html" class="briefing-item">
                                    <div class="briefing-date">
                                        <div class="day">${b.date.substring(5)}</div>
                                        <div class="weekday">(${b.day})</div>
                                    </div>
                                    <div class="briefing-content">
                                        <h3>${b.title}</h3>
                                        <p>${b.summary}</p>
                                    </div>
                                    <div class="briefing-meta">
                                        ${b.stats.articles} 기사 &nbsp; ${b.stats.sections} 섹션→
                                    </div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            document.getElementById('archive-container').innerHTML = html;
        }

        loadArchive();
    </script>

    <!-- PWA Install Banner -->
    <div class="pwa-install-banner" id="pwaInstallBanner">
        <div class="pwa-banner-content">
            <div class="pwa-banner-info">
                <div class="pwa-banner-icon">📰</div>
                <div class="pwa-banner-text">
                    <h4>JFNB 앱 설치</h4>
                    <p>홈 화면에 추가하여 빠르게 접근하세요</p>
                </div>
            </div>
            <div class="pwa-banner-actions">
                <button class="pwa-btn-dismiss" onclick="dismissInstallBanner()">닫기</button>
                <button class="pwa-btn-install" onclick="installPWA()">설치</button>
            </div>
        </div>
    </div>

    <!-- PWA Update Toast -->
    <div class="pwa-update-toast" id="pwaUpdateToast">
        <span>새 버전이 있습니다</span>
        <button class="pwa-update-btn" onclick="updatePWA()">업데이트</button>
    </div>


    <!-- PWA Registration -->
    <script>
        // Service Worker Registration
        let deferredPrompt = null;
        let swRegistration = null;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    swRegistration = await navigator.serviceWorker.register('/briefing/sw.js', {
                        scope: '/briefing/'
                    });
                    console.log('[PWA] SW registered:', swRegistration.scope);

                    // Check for updates
                    swRegistration.addEventListener('updatefound', () => {
                        const newWorker = swRegistration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // New version available
                                document.getElementById('pwaUpdateToast')?.classList.add('show');
                            }
                        });
                    });
                } catch (err) {
                    console.log('[PWA] SW registration failed:', err);
                }
            });
        }

        // Install Prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Show install banner if not dismissed recently
            const dismissed = localStorage.getItem('pwa-install-dismissed');
            if (!dismissed || Date.now() - parseInt(dismissed) > 7 * 24 * 60 * 60 * 1000) {
                setTimeout(() => {
                    document.getElementById('pwaInstallBanner')?.classList.add('show');
                }, 3000);
            }
        });

        async function installPWA() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('[PWA] Install outcome:', outcome);
            deferredPrompt = null;
            document.getElementById('pwaInstallBanner')?.classList.remove('show');
        }

        function dismissInstallBanner() {
            document.getElementById('pwaInstallBanner')?.classList.remove('show');
            localStorage.setItem('pwa-install-dismissed', Date.now().toString());
        }

        function updatePWA() {
            if (swRegistration?.waiting) {
                swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            document.getElementById('pwaUpdateToast')?.classList.remove('show');
            window.location.reload();
        }

        // Track install success
        window.addEventListener('appinstalled', () => {
            console.log('[PWA] App installed successfully');
            deferredPrompt = null;
            document.getElementById('pwaInstallBanner')?.classList.remove('show');
        });
    </script>
</body>
</html>

    <!-- SW Cleanup: Unregister previously installed service workers -->
    <script>

        (function initTheme() {
            function applyTheme() {
                var isLight = localStorage.getItem('jfnb-theme') === 'light';
                if (document.body) document.body.classList.toggle('light-mode', isLight);
                var btn = document.getElementById('theme-toggle');
                if (btn) btn.textContent = isLight ? '\u2600\ufe0f' : '\ud83c\udf19';
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', applyTheme);
            } else {
                applyTheme();
            }
        })();

        function toggleTheme() {
            var isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('jfnb-theme', isLight ? 'light' : 'dark');
            var btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = isLight ? '\u2600\ufe0f' : '\ud83c\udf19';
        }

      window.__swCleanupReady = (async function() {
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(function(r) { return r.unregister(); }));
          }
          if ('caches' in window) {
            const names = await caches.keys();
            await Promise.all(names.map(function(n) { return caches.delete(n); }));
          }
        } catch (error) {
          console.warn('SW cleanup skipped:', error);
        }
      })();

    <script>
        async function loadArchive() {
            try {
                await (window.__swCleanupReady || Promise.resolve());
                const response = await fetch(`briefings.json?v=${Date.now()}`, { cache: 'no-store' });
                const data = await response.json();
                
                renderSpecials(data.specials || [], data.weekly || []);
                
                if (data.briefings.length === 0) {
                    document.getElementById('archive-container').innerHTML = 
                        '<div class="empty-state">아직 브리핑이 없습니다.</div>';
                    return;
                }

                renderBriefings(data.briefings);
                switchArchiveTab('briefing');

            } catch (error) {
                console.error('Error loading archive:', error);
                document.getElementById('archive-container').innerHTML = 
                    '<div class="empty-state">브리핑을 불러올 수 없습니다.</div>';
            }
        }

        function renderSpecials(specials, weekly) {
            const allItems = [];

            weekly.forEach(w => {
                const rawDate = w.date || '';
                const m = rawDate.match(/(\d{4})-(\d{2})-(\d{2})/);
                const dateLabel = m
                    ? `${parseInt(m[2], 10)}월 ${parseInt(m[3], 10)}일자`
                    : '';
                const badge = dateLabel
                    ? `📅 주간 브리핑 • ${dateLabel}`
                    : '📅 주간 브리핑';

                allItems.push({
                    type: 'weekly',
                    date: w.date,
                    title: w.title,
                    summary: w.summary,
                    period: w.period,
                    stats: w.stats,
                    badge: badge,
                    link: `archive/${w.date}.html`
                });
            });

            specials.forEach(s => {
                allItems.push({
                    type: 'special',
                    date: s.date,
                    title: s.title,
                    summary: s.summary,
                    period: s.period,
                    stats: s.stats,
                    badge: '⭐ 특별판',
                    link: `archive/${s.date}.html`
                });
            });

            if (allItems.length === 0) {
                const btnSpecial = document.getElementById('tab-special');
                if (btnSpecial) btnSpecial.style.display = 'none';
                return;
            }

            // period 종료일 기준 최신순 정렬 (단일 날짜도 지원)
            allItems.sort((a, b) => {
                const getEndDate = (item) => {
                    if (item.period && item.period.includes('~')) {
                        return item.period.split('~')[1].trim();
                    }
                    if (item.period && /^\d{4}-\d{2}-\d{2}/.test(item.period.trim())) {
                        return item.period.trim();
                    }
                    return '0000-00-00';
                };
                return getEndDate(b).localeCompare(getEndDate(a));
            });

            document.getElementById('special-section').style.display = 'block';

            document.getElementById('special-container').innerHTML = allItems.map(item => `
                <a href="${item.link}" class="special-card ${item.type}">
                    <div class="special-badge ${item.type}">${item.badge}</div>
                    <h3>${item.title}</h3>
                    <p class="summary">${item.summary}</p>
                    <div class="period">📆 ${item.period}</div>
                    <div class="stats">
                        <span>📰 ${item.stats.articles || item.stats.clusters || 0} ${item.type === 'weekly' ? '클러스터' : '기사'}</span>
                        <span>📑 ${item.stats.sections || item.stats.clusters || 0} 섹션</span>
                    </div>
                </a>
            `).join('');
        }

        function escapeHTML(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function truncate(str, max) {
            if (!str) return '';
            return str.length > max ? str.slice(0, max) + '...' : str;
        }

        function renderBriefings(briefings) {
            const months = {};
            
            briefings.forEach(b => {
                if (!b.date.match(/^\d{4}-\d{2}-\d{2}$/)) return;
                
                const monthKey = b.date.substring(0, 7);
                if (!months[monthKey]) {
                    months[monthKey] = [];
                }
                months[monthKey].push(b);
            });

            const sortedMonths = Object.keys(months).sort().reverse();

            const monthNames = {
                '01': '1월', '02': '2월', '03': '3월', '04': '4월',
                '05': '5월', '06': '6월', '07': '7월', '08': '8월',
                '09': '9월', '10': '10월', '11': '11월', '12': '12월'
            };

            let html = '';

            sortedMonths.forEach(monthKey => {
                const [year, month] = monthKey.split('-');
                const monthBriefings = months[monthKey];
                
                monthBriefings.sort((a, b) => b.date.localeCompare(a.date));

                html += `
                    <div class="month-group">
                        <div class="month-header">
                            <h2 class="month-title">${year}년 ${monthNames[month]}</h2>
                        </div>
                        <div class="timeline-list">
                            ${monthBriefings.map(b => `
                                <a href="archive/${encodeURIComponent(b.date)}.html" class="tl-item">
                                    <div class="tl-date">
                                        <div class="day">${escapeHTML(b.date.substring(5))}</div>
                                        <div class="weekday">(${escapeHTML(b.day || '')})</div>
                                    </div>
                                    <span class="tl-dot"></span>
                                    ${b.thumb_url ? `<div class="tl-thumbnail">
                                        <img src="${escapeHTML(b.thumb_url_xs || b.thumb_url)}"
                                             alt="${escapeHTML(b.thumb_alt || '')}" loading="lazy" decoding="async">
                                    </div>` : ''}
                                    <div class="tl-content">
                                        <h3 class="tl-title">${escapeHTML(truncate(b.title, 180))}</h3>
                                        <p class="tl-summary">${escapeHTML(b.summary)}</p>
                                    </div>
                                    <div class="tl-meta">${escapeHTML(b.stats?.articles || 0)} 기사</div>
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            document.getElementById('archive-container').innerHTML = html;
        }

        function switchArchiveTab(tabType) {
            const sectionBriefing = document.getElementById('archive-container');
            const sectionSpecial  = document.getElementById('special-section');
            const btnBriefing     = document.getElementById('tab-briefing');
            const btnSpecial      = document.getElementById('tab-special');

            [btnBriefing, btnSpecial].forEach(btn => {
                if (btn) btn.classList.remove('active');
            });
            [sectionBriefing, sectionSpecial].forEach(el => {
                if (el) el.classList.remove('fade-in-section');
            });

            if (tabType === 'briefing') {
                sectionSpecial.style.display  = 'none';
                sectionBriefing.style.display = 'block';
                if (btnBriefing) btnBriefing.classList.add('active');
                void sectionBriefing.offsetWidth;
                sectionBriefing.classList.add('fade-in-section');
            } else {
                sectionBriefing.style.display = 'none';
                sectionSpecial.style.display  = 'block';
                if (btnSpecial) btnSpecial.classList.add('active');
                void sectionSpecial.offsetWidth;
                sectionSpecial.classList.add('fade-in-section');
            }
        }

        loadArchive();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="JFNB">
    <meta name="application-name" content="JFNB">
    <meta name="msapplication-TileColor" content="#0a0a0f">
    <meta name="msapplication-TileImage" content="icons/icon-144x144.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-72x72.png">
    <title>검색 - Jae's Foreign News Briefing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --accent-red: #ff3b3b;
            --accent-orange: #ff8c42;
            --accent-gold: #ffd700;
            --accent-blue: #4a9eff;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --accent-cyan: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #666680;
            --border-color: #2a2a3a;
            --gradient-fire: linear-gradient(135deg, #ff3b3b, #ff8c42);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-fire);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .nav-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 900;
            background: var(--gradient-fire);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-search-compact {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0.4rem 0.75rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .nav-search-compact:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.15);
        }

        .nav-search-compact .search-icon {
            font-size: 0.85rem;
            margin-right: 0.4rem;
            opacity: 0.6;
        }

        .nav-search-compact input {
            background: transparent;
            border: none;
            width: 80px;
            font-size: 0.8rem;
            color: var(--text-primary);
            font-family: inherit;
        }

        .nav-search-compact input::placeholder {
            color: var(--text-muted);
        }

        .nav-search-compact input:focus {
            outline: none;
            width: 120px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--text-primary); }

        /* Search Hero */
        .search-hero {
            padding: 3rem 2rem;
            text-align: center;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }

        .search-hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .search-hero p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        /* Main Search Box */
        .main-search {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 50px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .main-search:focus-within {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(74, 158, 255, 0.15);
        }

        .main-search .search-icon {
            padding: 1rem 0 1rem 1.5rem;
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .main-search input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            color: var(--text-primary);
            font-family: inherit;
        }

        .main-search input::placeholder {
            color: var(--text-muted);
        }

        .main-search input:focus {
            outline: none;
        }

        .main-search button {
            background: var(--gradient-fire);
            border: none;
            padding: 1rem 2rem;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .main-search button:hover {
            opacity: 0.9;
        }

        /* Search Section */
        .search-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
        }

        /* Search Stats */
        .search-stats {
            margin-bottom: 1.5rem;
            padding: 1rem 1.25rem;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .search-stats strong {
            color: var(--accent-gold);
        }

        .search-stats .query {
            color: var(--accent-orange);
            font-weight: 600;
        }

        /* Results */
        .results-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .result-card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 1.25rem 1.5rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .result-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
            transform: translateX(4px);
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .result-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent-blue);
            background: rgba(74, 158, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
        }

        .result-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
            line-height: 1.4;
        }

        .result-title mark {
            background: rgba(255, 140, 66, 0.25);
            color: var(--accent-orange);
            padding: 0 0.15rem;
            border-radius: 3px;
        }

        .result-summary {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .result-summary mark {
            background: rgba(255, 140, 66, 0.15);
            color: var(--accent-orange);
            padding: 0 0.1rem;
            border-radius: 2px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        /* Popular Keywords */
        .popular-keywords {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
        }

        .keyword-tag {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.9rem;
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .keyword-tag:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(74, 158, 255, 0.1);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .footer .heart { color: var(--accent-red); }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-content { flex-direction: column; gap: 1rem; }
            .nav-right { gap: 1rem; }
            .nav-search-compact input { width: 60px; }
            .search-hero h1 { font-size: 2rem; }
            .main-search { flex-direction: column; border-radius: 16px; }
            .main-search button { border-radius: 0 0 14px 14px; }
            .search-section { padding: 1.5rem 1rem 3rem; }
        }
    
        /* PWA Install Banner */
        .pwa-install-banner {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a24 0%, #12121a 100%);
            border-top: 1px solid #2a2a3a;
            padding: 1rem 1.5rem;
            z-index: 10000;
            animation: slideUp 0.3s ease-out;
            backdrop-filter: blur(20px);
        }
        .pwa-install-banner.show { display: block; }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .pwa-banner-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .pwa-banner-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .pwa-banner-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff3b3b, #ff8c42);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        .pwa-banner-text h4 {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
        }
        .pwa-banner-text p {
            font-size: 0.75rem;
            color: #a0a0b0;
            margin: 0;
        }
        .pwa-banner-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .pwa-btn-install {
            padding: 0.5rem 1.25rem;
            background: linear-gradient(135deg, #ff3b3b, #ff8c42);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .pwa-btn-install:hover { opacity: 0.9; }
        .pwa-btn-dismiss {
            padding: 0.5rem 1rem;
            background: transparent;
            color: #666680;
            border: 1px solid #2a2a3a;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .pwa-btn-dismiss:hover { color: #a0a0b0; }

        /* PWA Update Toast */
        .pwa-update-toast {
            display: none;
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a24;
            border: 1px solid #4a9eff;
            border-radius: 12px;
            padding: 0.75rem 1.25rem;
            z-index: 10001;
            box-shadow: 0 8px 32px rgba(74, 158, 255, 0.2);
            animation: fadeInUp 0.3s ease-out;
        }
        .pwa-update-toast.show { display: flex; gap: 1rem; align-items: center; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .pwa-update-toast span { font-size: 0.85rem; color: #a0a0b0; }
        .pwa-update-btn {
            padding: 0.4rem 1rem;
            background: #4a9eff;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .pwa-install-banner { padding: 0.75rem 1rem; }
            .pwa-banner-text p { display: none; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <div class="nav-logo-icon">📰</div>
                <span class="nav-logo-text">Jae's Briefing</span>
            </a>
            
            <div class="nav-right">
                <form action="search.html" method="get" class="nav-search-compact">
                    <span class="search-icon">🔍</span>
                    <input type="text" name="q" placeholder="검색...">
                </form>
                
                <ul class="nav-links">
                    <li><a href="index.html">홈</a></li>
                    <li><a href="archive.html">아카이브</a></li>
                    <li><a href="about.html">소개</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Search Hero -->
    <section class="search-hero">
        <h1>🔍 브리핑 검색</h1>
        <p>과거 브리핑에서 기사를 검색하세요</p>
        
        <div class="main-search">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="검색어 입력... (예: Nvidia, 반도체, AI)" autofocus>
            <button onclick="performSearch()">검색</button>
        </div>
    </section>

    <!-- Search Results Section -->
    <section class="search-section">
        <div id="search-stats" class="search-stats" style="display: none;"></div>

        <div id="results-container" class="results-container">
            <div class="empty-state">
                <div class="icon">🔎</div>
                <h3>검색어를 입력하세요</h3>
                <p>기사 제목, 내용, 키워드로 검색할 수 있습니다</p>
                
                <div class="popular-keywords">
                    <span class="keyword-tag" onclick="searchKeyword('AI')">AI</span>
                    <span class="keyword-tag" onclick="searchKeyword('Nvidia')">Nvidia</span>
                    <span class="keyword-tag" onclick="searchKeyword('반도체')">반도체</span>
                    <span class="keyword-tag" onclick="searchKeyword('삼성')">삼성</span>
                    <span class="keyword-tag" onclick="searchKeyword('Tesla')">Tesla</span>
                    <span class="keyword-tag" onclick="searchKeyword('OpenAI')">OpenAI</span>
                    <span class="keyword-tag" onclick="searchKeyword('아마존')">아마존</span>
                    <span class="keyword-tag" onclick="searchKeyword('중국')">중국</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>Curated by Claude with <span class="heart">♥</span></p>
    </footer>

    <script>
        let searchIndex = null;
        let isLoading = false;

        async function loadSearchIndex() {
            if (searchIndex) return searchIndex;
            if (isLoading) return null;
            
            isLoading = true;
            try {
                const response = await fetch('search-index.json');
                if (!response.ok) throw new Error('Index not found');
                searchIndex = await response.json();
                return searchIndex;
            } catch (error) {
                console.error('Failed to load search index:', error);
                return null;
            } finally {
                isLoading = false;
            }
        }

        function highlightText(text, query) {
            if (!query || !text) return text;
            const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 0);
            let result = text;
            terms.forEach(term => {
                const regex = new RegExp(`(${escapeRegex(term)})`, 'gi');
                result = result.replace(regex, '<mark>$1</mark>');
            });
            return result;
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function searchKeyword(keyword) {
            document.getElementById('search-input').value = keyword;
            performSearch();
        }

        async function performSearch() {
            const query = document.getElementById('search-input').value.trim();
            
            if (!query) {
                showEmptyState();
                return;
            }

            const index = await loadSearchIndex();
            if (!index) {
                showError('검색 인덱스를 불러올 수 없습니다.');
                return;
            }

            const terms = query.toLowerCase().split(/\s+/).filter(t => t.length > 0);
            
            const results = index.articles
                .map(article => {
                    let score = 0;
                    const titleLower = (article.title || '').toLowerCase();
                    const summaryLower = (article.summary || '').toLowerCase();
                    const keywords = (article.keywords || []).join(' ').toLowerCase();
                    
                    terms.forEach(term => {
                        if (titleLower.includes(term)) score += 10;
                        if (summaryLower.includes(term)) score += 5;
                        if (keywords.includes(term)) score += 3;
                    });
                    
                    return { ...article, score };
                })
                .filter(article => article.score > 0)
                .sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return (b.date || '').localeCompare(a.date || '');
                });

            displayResults(results, query);
            
            const url = new URL(window.location);
            url.searchParams.set('q', query);
            window.history.replaceState({}, '', url);
        }

        function displayResults(results, query) {
            const container = document.getElementById('results-container');
            const statsEl = document.getElementById('search-stats');

            if (results.length === 0) {
                statsEl.style.display = 'none';
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">😕</div>
                        <h3>"${escapeHtml(query)}"에 대한 검색 결과가 없습니다</h3>
                        <p>다른 키워드로 검색해보세요</p>
                        <div class="popular-keywords">
                            <span class="keyword-tag" onclick="searchKeyword('AI')">AI</span>
                            <span class="keyword-tag" onclick="searchKeyword('Nvidia')">Nvidia</span>
                            <span class="keyword-tag" onclick="searchKeyword('반도체')">반도체</span>
                        </div>
                    </div>
                `;
                return;
            }

            statsEl.style.display = 'block';
            statsEl.innerHTML = `<span class="query">"${escapeHtml(query)}"</span> 검색 결과: <strong>${results.length}</strong>개 기사`;

            container.innerHTML = results.map(article => `
                <a href="archive/${article.file}.html" class="result-card">
                    <div class="result-header">
                        <span class="result-date">${article.date || '날짜 없음'}</span>
                    </div>
                    <div class="result-title">${highlightText(escapeHtml(article.title), query)}</div>
                    <div class="result-summary">${highlightText(escapeHtml(article.summary || ''), query)}</div>
                </a>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showEmptyState() {
            document.getElementById('search-stats').style.display = 'none';
            document.getElementById('results-container').innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔎</div>
                    <h3>검색어를 입력하세요</h3>
                    <p>기사 제목, 내용, 키워드로 검색할 수 있습니다</p>
                    <div class="popular-keywords">
                        <span class="keyword-tag" onclick="searchKeyword('AI')">AI</span>
                        <span class="keyword-tag" onclick="searchKeyword('Nvidia')">Nvidia</span>
                        <span class="keyword-tag" onclick="searchKeyword('반도체')">반도체</span>
                        <span class="keyword-tag" onclick="searchKeyword('삼성')">삼성</span>
                        <span class="keyword-tag" onclick="searchKeyword('Tesla')">Tesla</span>
                        <span class="keyword-tag" onclick="searchKeyword('OpenAI')">OpenAI</span>
                    </div>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('search-stats').style.display = 'none';
            document.getElementById('results-container').innerHTML = `
                <div class="empty-state">
                    <div class="icon">⚠️</div>
                    <h3>오류가 발생했습니다</h3>
                    <p>${message}</p>
                </div>
            `;
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        const urlParams = new URLSearchParams(window.location.search);
        const initialQuery = urlParams.get('q');
        if (initialQuery) {
            document.getElementById('search-input').value = initialQuery;
            performSearch();
        }

        loadSearchIndex();
    </script>

    <!-- PWA Install Banner -->
    <div class="pwa-install-banner" id="pwaInstallBanner">
        <div class="pwa-banner-content">
            <div class="pwa-banner-info">
                <div class="pwa-banner-icon">📰</div>
                <div class="pwa-banner-text">
                    <h4>JFNB 앱 설치</h4>
                    <p>홈 화면에 추가하여 빠르게 접근하세요</p>
                </div>
            </div>
            <div class="pwa-banner-actions">
                <button class="pwa-btn-dismiss" onclick="dismissInstallBanner()">닫기</button>
                <button class="pwa-btn-install" onclick="installPWA()">설치</button>
            </div>
        </div>
    </div>

    <!-- PWA Update Toast -->
    <div class="pwa-update-toast" id="pwaUpdateToast">
        <span>새 버전이 있습니다</span>
        <button class="pwa-update-btn" onclick="updatePWA()">업데이트</button>
    </div>


    <!-- PWA Registration -->
    <script>
        // Service Worker Registration
        let deferredPrompt = null;
        let swRegistration = null;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', async () => {
                try {
                    swRegistration = await navigator.serviceWorker.register('/briefing/sw.js', {
                        scope: '/briefing/'
                    });
                    console.log('[PWA] SW registered:', swRegistration.scope);

                    // Check for updates
                    swRegistration.addEventListener('updatefound', () => {
                        const newWorker = swRegistration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // New version available
                                document.getElementById('pwaUpdateToast')?.classList.add('show');
                            }
                        });
                    });
                } catch (err) {
                    console.log('[PWA] SW registration failed:', err);
                }
            });
        }

        // Install Prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Show install banner if not dismissed recently
            const dismissed = localStorage.getItem('pwa-install-dismissed');
            if (!dismissed || Date.now() - parseInt(dismissed) > 7 * 24 * 60 * 60 * 1000) {
                setTimeout(() => {
                    document.getElementById('pwaInstallBanner')?.classList.add('show');
                }, 3000);
            }
        });

        async function installPWA() {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log('[PWA] Install outcome:', outcome);
            deferredPrompt = null;
            document.getElementById('pwaInstallBanner')?.classList.remove('show');
        }

        function dismissInstallBanner() {
            document.getElementById('pwaInstallBanner')?.classList.remove('show');
            localStorage.setItem('pwa-install-dismissed', Date.now().toString());
        }

        function updatePWA() {
            if (swRegistration?.waiting) {
                swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
            }
            document.getElementById('pwaUpdateToast')?.classList.remove('show');
            window.location.reload();
        }

        // Track install success
        window.addEventListener('appinstalled', () => {
            console.log('[PWA] App installed successfully');
            deferredPrompt = null;
            document.getElementById('pwaInstallBanner')?.classList.remove('show');
        });
    </script>
</body>
</html>

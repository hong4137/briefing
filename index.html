    <!-- SW Cleanup: Unregister previously installed service workers -->
    <script>

        (function initTheme() {
            function applyTheme() {
                var isLight = localStorage.getItem('jfnb-theme') === 'light';
                if (document.body) document.body.classList.toggle('light-mode', isLight);
                var btn = document.getElementById('theme-toggle');
                if (btn) btn.textContent = isLight ? '\u2600\ufe0f' : '\ud83c\udf19';
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', applyTheme);
            } else {
                applyTheme();
            }
        })();

        function toggleTheme() {
            var isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('jfnb-theme', isLight ? 'light' : 'dark');
            var btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = isLight ? '\u2600\ufe0f' : '\ud83c\udf19';
        }

      window.__swCleanupReady = (async function() {
        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map(function(r) { return r.unregister(); }));
          }
          if ('caches' in window) {
            const names = await caches.keys();
            await Promise.all(names.map(function(n) { return caches.delete(n); }));
          }
        } catch (error) {
          console.warn('SW cleanup skipped:', error);
        }
      })();

    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --bg-card-hover: #222230;
            --accent-red: #ff3b3b;
            --accent-orange: #ff8c42;
            --accent-gold: #ffd700;
            --accent-blue: #4a9eff;
            --accent-purple: #a855f7;
            --accent-green: #22c55e;
            --accent-cyan: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --text-muted: #666680;
            --border-color: #2a2a3a;
            --gradient-fire: linear-gradient(135deg, #ff3b3b, #ff8c42);
            --gradient-money: linear-gradient(135deg, #22c55e, #06b6d4);
            --gradient-ai: linear-gradient(135deg, #a855f7, #4a9eff);
            --gradient-special: linear-gradient(135deg, #ffd700, #ff8c42);
            --gradient-weekly: linear-gradient(135deg, #06b6d4, #22c55e);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navigation */
        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .nav-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .nav-logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-fire);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .nav-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 900;
            background: var(--gradient-fire);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--text-primary); }
        .nav-links a.active { color: var(--accent-red); }

        .stat-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Latest Briefing */
        .latest {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2.5rem 2rem 3rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            background: var(--gradient-fire);
        }

        .section-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
        }

        .view-all {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: gap 0.2s;
        }

        .view-all:hover { gap: 0.75rem; }

        /* Latest Card */
        .latest-card {
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .latest-card:hover {
            border-color: var(--accent-red);
            transform: translateY(-6px);
            box-shadow:
                0 0 0 1px rgba(255, 59, 59, 0.25),
                0 24px 80px rgba(255, 59, 59, 0.22),
                0 8px 32px rgba(255, 140, 66, 0.12);
        }

        .latest-card-header {
            background: linear-gradient(135deg, rgba(255, 59, 59, 0.1), rgba(255, 140, 66, 0.1));
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .latest-date {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-primary);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .latest-date .live {
            width: 8px;
            height: 8px;
            background: var(--accent-red);
            border-radius: 50%;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .latest-card-header h3 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .latest-card-header p {
            color: var(--text-secondary);
        }

        .latest-card-body {
            padding: 2rem;
        }

        .latest-highlights {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .highlight {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            display: block;
            transition: all 0.3s ease;
        }

        .highlight:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            background: var(--bg-card-hover);
        }

        .highlight-link {
            display: inline-block;
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: var(--accent-blue);
            font-weight: 500;
        }

        .highlight:hover .highlight-link {
            text-decoration: underline;
        }

        .highlight-category {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
        }

        .highlight-category.top { color: var(--accent-red); }
        .highlight-category.economy { color: var(--accent-green); }
        .highlight-category.ai { color: var(--accent-purple); }

        .highlight h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .highlight p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .latest-card-footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .briefing-stats {
            display: flex;
            gap: 2rem;
        }

        .briefing-stat {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .briefing-stat strong {
            color: var(--text-primary);
        }

        .read-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--gradient-fire);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .read-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(255, 59, 59, 0.3);
        }

        /* Special/Weekly Section */
        .special-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }

        .special-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .special-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 1.75rem;
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .special-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .special-card.special::before {
            background: var(--gradient-special);
        }

        .special-card.weekly::before {
            background: var(--gradient-weekly);
        }

        .special-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-gold);
            box-shadow: 0 16px 48px rgba(255, 215, 0, 0.15);
        }

        .special-card.weekly:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 16px 48px rgba(6, 182, 212, 0.15);
        }

        .special-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
        }

        .special-badge.special {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 140, 66, 0.2));
            color: var(--accent-gold);
        }

        .special-badge.weekly {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(34, 197, 94, 0.2));
            color: var(--accent-cyan);
        }

        .special-card h4 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .special-card .summary {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .special-card .period {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .special-card .stats {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Archive Section */
        .archive {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem 4rem;
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .archive-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        .archive-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .archive-card-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent-blue);
            margin-bottom: 0.75rem;
        }

        .archive-card h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .archive-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .archive-card-meta {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        .footer p { margin-bottom: 0.5rem; }
        .footer .heart { color: var(--accent-red); }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
        }

        .footer-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .footer-links a:hover { color: var(--text-primary); }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .latest-highlights { grid-template-columns: 1fr; }
            .special-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .nav-content { flex-direction: column; gap: 1rem; }
            .nav-links { gap: 1rem; }
            .section-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .latest-card-footer { flex-direction: column; gap: 1rem; }
            .briefing-stats { flex-wrap: wrap; }
        }
/* Nav Right */
.nav-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
}
        /* Compact Search */
.nav-search-compact {
    display: flex;
    align-items: center;
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: 20px;
    padding: 0.4rem 0.75rem;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.nav-search-compact:focus-within {
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.15);
}

.nav-search-compact .search-icon {
    font-size: 0.85rem;
    margin-right: 0.4rem;
    opacity: 0.6;
}

.nav-search-compact input {
    background: transparent;
    border: none;
    width: 80px;
    font-size: 0.8rem;
    color: var(--text-primary);
    font-family: inherit;
}

.nav-search-compact input::placeholder {
    color: var(--text-muted);
}

.nav-search-compact input:focus {
    outline: none;
    width: 120px;
}

@media (max-width: 768px) {
    .nav-right { gap: 1rem; }
    .nav-search-compact input { width: 60px; }
    .nav-search-compact input:focus { width: 80px; }
}

.portal-wrap {
    background: var(--bg-card);
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid var(--border-color);
}
.portal-hero {
    display: block;
    position: relative;
    text-decoration: none;
    color: inherit;
    min-height: 380px;
    overflow: hidden;
    transition: filter 0.2s ease;
}
.portal-hero:hover { filter: brightness(1.05); }
.portal-hero-img,
.portal-hero-no-img {
    position: absolute;
    inset: 0;
    background: var(--bg-secondary);
}
.portal-hero-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 40%;
    display: block;
}
.portal-hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(10,10,15,0.1) 0%, rgba(10,10,15,0.85) 100%);
}
.portal-hero-body {
    position: relative;
    padding: 2rem;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    min-width: 0;
}
.portal-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
}
.portal-live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-red);
    animation: portalPulse 2s infinite;
}
@keyframes portalPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.portal-date,
.portal-stats {
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.75);
}
.portal-hero-title {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.3;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    margin-bottom: 0.75rem;
    overflow-wrap: anywhere;
    word-break: keep-all;
}
.portal-hero-summary {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.8);
    line-height: 1.6;
    overflow-wrap: anywhere;
    word-break: keep-all;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.portal-sub-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border-color);
    border-top: 1px solid var(--border-color);
}
.portal-sub {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    color: inherit;
    background: var(--bg-card);
    overflow: hidden;
    min-width: 0;
    transition: background 0.2s ease;
}
.portal-sub:hover { background: var(--bg-card-hover); }
.portal-sub-img {
    height: 130px;
    overflow: hidden;
    flex-shrink: 0;
}
.portal-sub-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.35s ease;
}
.portal-sub:hover .portal-sub-img img { transform: scale(1.05); }
.portal-sub-body {
    padding: 1rem 1.25rem;
    flex: 1;
}
.portal-sub-index {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--accent-red);
    background: rgba(255,59,59,0.1);
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    margin-bottom: 0.5rem;
}
.portal-sub-title {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text-primary);
    overflow-wrap: anywhere;
    word-break: keep-all;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.portal-sub-summary {
    font-size: 0.8rem;
    color: var(--text-secondary);
    line-height: 1.5;
    margin-top: 0.4rem;
    overflow-wrap: anywhere;
    word-break: keep-all;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.portal-more-list {
    list-style: none;
    border-top: 1px solid var(--border-color);
    padding: 0.5rem 0;
}
.portal-more-item { border-bottom: 1px solid var(--border-color); }
.portal-more-item:last-child { border-bottom: none; }
.portal-more-item a {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 0.7rem 1.5rem;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s ease;
}
.portal-more-item a:hover { background: var(--bg-card-hover); }
.portal-more-index {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-muted);
    flex-shrink: 0;
    width: 1.2rem;
}
.portal-more-title {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-secondary);
    line-height: 1.4;
    overflow-wrap: anywhere;
    word-break: keep-all;
}
.portal-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border-color);
    background: var(--bg-secondary);
}
.portal-footer-stats {
    display: flex;
    gap: 1.25rem;
    font-size: 0.82rem;
    color: var(--text-muted);
}
.portal-footer-stats strong { color: var(--text-secondary); }
@media (max-width: 768px) {
    .portal-hero,
    .portal-hero-body { min-height: 260px; }
    .portal-hero-title { font-size: 1.2rem; }
    .portal-sub-grid { grid-template-columns: 1fr; }
    .portal-sub-img { height: 100px; }
    .portal-footer { flex-direction: column; gap: 0.75rem; }
}

    <!-- Latest Briefing -->
    <section class="latest">

    <!-- Past Briefings -->
    <section class="archive">
        <div class="section-header">
            <div class="section-title">
                <div class="section-icon" style="background: var(--gradient-ai);">📚</div>
                <h2>지난 브리핑</h2>
            </div>

        </div>

        <div id="archive-container" class="archive-grid">

    <!-- Footer -->
    <footer class="footer">
        <p>Curated by Claude with <span class="heart">♥</span></p>

            <a href="https://github.com/hong4137">GitHub</a>
            <a href="about.html">소개</a>
            <a href="archive.html">아카이브</a>
        </div>
    </footer>

    <script>
        const categoryLabels = {
            'top': 'TOP 헤드라인',
            'economy': '경제/금융',
            'ai': 'AI/기술',
            'semiconductor': '반도체'
        };

        async function loadBriefings() {
            try {
                await (window.__swCleanupReady || Promise.resolve());
                const response = await fetch(`briefings.json?v=${Date.now()}`, { cache: 'no-store' });
                const data = await response.json();
                
                if (data.briefings.length === 0) {
                    document.getElementById('latest-container').innerHTML = 
                        '<div class="empty-state">아직 브리핑이 없습니다.</div>';
                    document.getElementById('archive-container').innerHTML = 
                        '<div class="empty-state">아직 브리핑이 없습니다.</div>';
                    return;
                }

                // 일일 브리핑: YYYY-MM-DD 형식만
                const dailyBriefings = data.briefings.filter(b => 
                    b.date && /^\d{4}-\d{2}-\d{2}$/.test(b.date) && b.title
                );

                // 날짜 추출 헬퍼: 발행일 기준 정렬
                const getPublishDate = (item) => {
                    if (!item || !item.date) return '0000-00-00';
                    // weekly-2026-03-01 → 2026-03-01
                    const match = item.date.match(/(\d{4}-\d{2}-\d{2})/);
                    if (match) return match[1];
                    return '0000-00-00';
                };

                // 모든 타입을 합쳐서 발행일 최신순 정렬
                const allItems = [
                    ...dailyBriefings.map(b => ({...b, _type: 'daily', _sortDate: b.date, _link: `archive/${b.date}.html`})),
                    ...(data.specials || []).map(s => ({...s, _type: 'special', _sortDate: getPublishDate(s), _link: `archive/${s.date}.html`})),
                    ...(data.weekly || []).map(w => ({...w, _type: 'weekly', _sortDate: getPublishDate(w), _link: `archive/${w.date}.html`}))
                ].sort((a, b) => b._sortDate.localeCompare(a._sortDate));

                // 가장 최신 항목을 최신 브리핑으로 표시
                if (allItems.length > 0) {
                    renderLatest(allItems[0]);
                } else {
                    document.getElementById('latest-container').innerHTML = 
                        '<div class="empty-state">아직 브리핑이 없습니다.</div>';
                }

                // 지난 브리핑은 일일 브리핑만 (최신이 daily면 skip first)
                const latestIsDaily = allItems.length > 0 && allItems[0]._type === 'daily';
                const past = latestIsDaily ? dailyBriefings.slice(1, 4) : dailyBriefings.slice(0, 3);
                renderArchive(past);

                // Special & Weekly briefings
                renderSpecials(data.specials || [], data.weekly || []);

            } catch (error) {
                console.error('Error loading briefings:', error);
                document.getElementById('latest-container').innerHTML = 
                    '<div class="empty-state">브리핑을 불러올 수 없습니다.</div>';
            }
        }

        function parseTitles(rawTitle) {
            return String(rawTitle || '').split('|').map(t => t.trim()).filter(Boolean);
        }

        function parseSentences(rawSummary) {
            return String(rawSummary || '').split(/\.\s+/).map(s => s.trim()).filter(Boolean);
        }

        function buildSegments(titles, sentences) {
            const n = titles.length;
            if (n === 0) return [];
            if (sentences.length === 0) return titles.map(t => ({ title: t, summary: '' }));

            const perSlot   = Math.floor(sentences.length / n);
            const remainder = sentences.length % n;
            const segments  = [];
            let cursor = 0;

            titles.forEach((title, i) => {
                const count = perSlot + (i === n - 1 ? remainder : 0);
                const chunk = sentences.slice(cursor, cursor + count);
                segments.push({ title, summary: chunk.join('. ') + (chunk.length ? '.' : '') });
                cursor += count;
            });

            return segments;
        }

        function renderLatest(briefing) {
            const titles    = parseTitles(briefing.title);
            const sentences = parseSentences(briefing.summary);
            const segments  = buildSegments(titles, sentences);

            if (segments.length === 0) {
                document.getElementById('latest-container').innerHTML =
                    '<div class="empty-state">표시할 브리핑이 없습니다.</div>';
                return;
            }

            const baseLink = briefing._link || `archive/${briefing.date}.html`;
            const coverSrc = briefing.thumb_url
                ? briefing.thumb_url.replace('w=480','w=1200').replace('h=270','h=675')
                : '';
            const coverAlt = briefing.thumb_alt || '';

            const hero = segments[0];
            const heroHTML = `
                <a href="${baseLink}" class="portal-hero">
                    ${coverSrc ? `
                    <div class="portal-hero-img">
                        <img src="${coverSrc}" alt="${coverAlt}" loading="lazy" decoding="async">
                        <div class="portal-hero-overlay"></div>
                    </div>` : '<div class="portal-hero-no-img"></div>'}
                    <div class="portal-hero-body">
                        <div class="portal-meta">
                            <span class="portal-live-dot"></span>
                            <span class="portal-date">${briefing.date} KST</span>
                            <span class="portal-stats">${briefing.stats?.articles || briefing.stats?.clusters || 0} 건</span>
                        </div>
                        <h2 class="portal-hero-title">${hero.title}</h2>
                        ${hero.summary ? `<p class="portal-hero-summary">${hero.summary}</p>` : ''}
                    </div>
                </a>`;

            const subs = segments.slice(1, 3);
            const subSrc = briefing.thumb_url
                ? briefing.thumb_url.replace('w=480','w=400').replace('h=270','h=225')
                : '';
            const subGridHTML = subs.length ? `
                <div class="portal-sub-grid">
                    ${subs.map((seg, i) => `
                    <a href="${baseLink}" class="portal-sub">
                        ${subSrc ? `
                        <div class="portal-sub-img">
                            <img src="${subSrc}" alt="${coverAlt}" loading="lazy" decoding="async">
                        </div>` : ''}
                        <div class="portal-sub-body">
                            <span class="portal-sub-index">${i + 2}</span>
                            <h3 class="portal-sub-title">${seg.title}</h3>
                            ${seg.summary ? `<p class="portal-sub-summary">${seg.summary}</p>` : ''}
                        </div>
                    </a>`).join('')}
                </div>` : '';

            const moreItems = segments.slice(3);
            const moreHTML = moreItems.length ? `
                <ul class="portal-more-list">
                    ${moreItems.map((seg, i) => `
                    <li class="portal-more-item">
                        <a href="${baseLink}">
                            <span class="portal-more-index">${i + 4}</span>
                            <span class="portal-more-title">${seg.title}</span>
                        </a>
                    </li>`).join('')}
                </ul>` : '';

            const footerHTML = `
                <div class="portal-footer">
                    <div class="portal-footer-stats">
                        <span><strong>${briefing.stats?.articles || briefing.stats?.clusters || 0}</strong> 건</span>
                        <span><strong>${briefing.stats?.sections || briefing.stats?.clusters || 0}</strong> 섹션</span>
                        ${briefing.stats?.picks ? `<span><strong>${briefing.stats.picks}</strong> Claude's Pick</span>` : ''}
                    </div>
                    <a href="${baseLink}" class="read-btn">브리핑 읽기 →</a>
                </div>`;

            document.getElementById('latest-container').innerHTML = `
                <div class="portal-wrap">
                    ${heroHTML}${subGridHTML}${moreHTML}${footerHTML}
                </div>`;
        }

        function renderArchive(briefings) {
            if (briefings.length === 0) {
                document.getElementById('archive-container').innerHTML = 
                    '<div class="empty-state">지난 브리핑이 없습니다.</div>';
                return;
            }

            document.getElementById('archive-container').innerHTML = briefings.map(b => `
                <a href="archive/${b.date}.html" class="highlight">
                    ${b.thumb_url ? `<div class="card-thumbnail">
                        <img src="${b.thumb_url}" alt="${b.thumb_alt || ''}" loading="lazy" decoding="async">
                    </div>` : ''}
                    <div class="archive-card-date">${b.date} (${b.day})</div>
                    <h4>${b.title}</h4>
                    <p>${b.summary}</p>
                    <div class="archive-card-meta">
                        <span>${b.stats.articles} 기사</span>
                        <span>${b.stats.sections} 섹션</span>
                    </div>
                </a>
            `).join('');
        }

function renderSpecials(specials, weekly) {
    const allItems = [];

    // 주간 브리핑 데이터 수집
    weekly.forEach(w => {
        const rawDate = w.date || '';
        const m = rawDate.match(/(\d{4})-(\d{2})-(\d{2})/);
        const dateLabel = m
            ? `${parseInt(m[2], 10)}월 ${parseInt(m[3], 10)}일자`
            : '';
        const badge = dateLabel
            ? `📅 주간 브리핑 • ${dateLabel}`
            : '📅 주간 브리핑';

        allItems.push({
            type: 'weekly',
            date: w.date,
            title: w.title,
            summary: w.summary,
            period: w.period,
            stats: w.stats,
            badge: badge,
            link: `archive/${w.date}.html`
        });
    });

    // 특별판 데이터 수집
    specials.forEach(s => {
        allItems.push({
            type: 'special',
            date: s.date,
            title: s.title,
            summary: s.summary,
            period: s.period,
            stats: s.stats,
            badge: '⭐ 특별판',
            link: `archive/${s.date}.html`
        });
    });

    // 정렬
    allItems.sort((a, b) => {
        const getEndDate = (item) => {
            if (item.period && item.period.includes('~')) {
                return item.period.split('~')[1].trim();
            }
            if (item.period && /^\d{4}-\d{2}-\d{2}/.test(item.period.trim())) {
                return item.period.trim();
            }
            return '0000-00-00';
        };
        return getEndDate(b).localeCompare(getEndDate(a));
    });

    if (allItems.length === 0) {
        document.getElementById('special-section').style.display = 'none';
        return;
    }

    document.getElementById('special-section').style.display = 'block';

    // 최신 2개는 기본 노출, 나머지는 hidden-special-card 클래스 및 display: none 상태로 렌더링
    const cardsHTML = allItems.map((item, index) => {
        const isHidden = index >= 2;
        const displayStyle = isHidden ? 'display: none;' : '';
        const hiddenClass = isHidden ? 'hidden-special-card' : '';

        return `
            <a href="${item.link}" class="special-card ${item.type} ${hiddenClass}" style="${displayStyle}">
                <div class="special-badge ${item.type}">${item.badge}</div>
                <h4>${item.title}</h4>
                <p class="summary">${item.summary}</p>
                <div class="period">📆 ${item.period}</div>
                <div class="stats">
                    <span>📰 ${item.stats.articles || item.stats.clusters || 0} ${item.type === 'weekly' ? '클러스터' : '기사'}</span>
                    <span>📑 ${item.stats.sections || item.stats.clusters || 0} 섹션</span>
                </div>
            </a>
        `;
    }).join('');

    // 컨테이너 채우기
    let containerHTML = cardsHTML;

    // 3개 이상일 때만 '더 보기' 아코디언 토글 버튼 추가
    if (allItems.length > 2) {
        containerHTML += `
            <div id="special-toggle-container" style="grid-column: span 2; display: flex; justify-content: center; margin-top: 1.5rem;">
                <button id="btn-special-toggle" onclick="toggleSpecialCards()" style="
                    background: rgba(26, 26, 36, 0.6);
                    border: 1px solid var(--border-color);
                    color: var(--text-secondary);
                    padding: 0.75rem 2rem;
                    border-radius: 50px;
                    font-size: 0.9rem;
                    font-weight: 500;
                    cursor: pointer;
                    backdrop-filter: blur(10px);
                    transition: all 0.2s ease;
                ">더 보기 ▾</button>
            </div>
        `;
    }

    document.getElementById('special-container').innerHTML = containerHTML;
}

// 아코디언 상태 토글을 위한 글로벌 함수 정의
window.toggleSpecialCards = function() {
    const hiddenCards = document.querySelectorAll('.hidden-special-card');
    const toggleBtn = document.getElementById('btn-special-toggle');
    if (hiddenCards.length === 0 || !toggleBtn) return;

    // 현재 숨겨져 있는지 체크 (첫 번째 숨김 카드의 상태 조사)
    const isHidden = hiddenCards[0].style.display === 'none';

    if (isHidden) {
        // 숨김 카드 노출
        hiddenCards.forEach(card => {
            card.style.display = 'block';
            card.style.opacity = '0';
            setTimeout(() => {
                card.style.transition = 'opacity 0.3s ease';
                card.style.opacity = '1';
            }, 10);
        });
        toggleBtn.innerHTML = '접기 ▴';
        toggleBtn.style.borderColor = 'var(--accent-blue)';
        toggleBtn.style.color = 'var(--text-primary)';
    } else {
        // 숨김 처리
        hiddenCards.forEach(card => {
            card.style.display = 'none';
        });
        toggleBtn.innerHTML = '더 보기 ▾';
        toggleBtn.style.borderColor = 'var(--border-color)';
        toggleBtn.style.color = 'var(--text-secondary)';

        // 접은 후 스크롤을 특별판 섹션 타이틀 쪽으로 우아하게 이동
        document.getElementById('special-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
};

        // Load on page ready
        loadBriefings();
    </script>

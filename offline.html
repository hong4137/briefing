<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오프라인 - JFNB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .offline-container {
            max-width: 400px;
        }
        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #ff3b3b, #ff8c42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #a0a0b0;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .retry-btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #ff3b3b, #ff8c42);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .retry-btn:hover { opacity: 0.9; }
        .cached-hint {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #666680;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>오프라인 상태입니다</h1>
        <p>인터넷 연결이 끊어져 있습니다.<br>이전에 열어본 브리핑은 오프라인에서도 볼 수 있습니다.</p>
        <button class="retry-btn" onclick="window.location.reload()">다시 시도</button>
        <p class="cached-hint">💡 자주 보는 브리핑은 자동으로 캐시됩니다</p>
    </div>
</body>
</html>
